
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Checkout</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-glow"></div>

<div class="dashboard">

    <header class="topbar">
        <div>
            <h1>Equipment Checkout</h1>
            <p>Broadcast Asset Management</p>
        </div>

        <div class="student-badge">
            <span>Student</span>
            <strong id="studentName">Loading...</strong>
        </div>
    </header>

    <div class="checkout-grid">

        <div class="scan-panel">
            <h2>Scan Equipment</h2>

            <div class="scan-box">
                <div class="scan-icon">📶</div>
                <h3>Ready to Scan</h3>
                <p>Tap an NFC tag to add equipment.</p>
            </div>

            <button type="button" id="scanNfcBtn">
                Scan NFC Tag
            </button>

            <p id="scanStatus" class="status-text">
                Point the device at an NFC asset tag.
            </p>
        </div>

        <div class="equipment-panel">
            <div class="panel-header">
                <h2>Equipment List</h2>
                <span id="itemCount">0 Items</span>
            </div>

            <div id="equipmentList" class="equipment-list">

            </div>

            <button class="checkout-btn">
                Check Out Equipment
            </button>
        </div>

    </div>

</div>

<script src="checkout.js"></script>

</body>
</html>
